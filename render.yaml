services:
  - type: web
    name: freellmapi
    env: node
    nodeVersion: 20
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: ENCRYPTION_KEY
        scope: run
        generateValue: true
      - key: NODE_ENV
        scope: run
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_PATH
        scope: run
        value: /var/data/freeapi.db
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
