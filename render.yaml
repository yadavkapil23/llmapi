services:
  - type: web
    name: freellmapi
    env: node
    nodeVersion: 20
    buildCommand: npm install && npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: ENCRYPTION_KEY
        scope: run
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_PATH
        value: /app/data/freeapi.db
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
